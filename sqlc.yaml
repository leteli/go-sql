version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations/*.up.sql"
    queries: "query/courses"
    gen:
      go:
        package: "coursesdb"
        out: "internal/db/courses"
        emit_prepared_queries: true
        emit_json_tags: true
        emit_interface: true
  - engine: "sqlite"
    schema: "migrations/*.up.sql"
    queries: "query/users"
    gen:
      go:
        package: "usersdb"
        out: "internal/db/users"
        emit_prepared_queries: true
        emit_json_tags: true
        emit_interface: true
  - engine: "sqlite"
    schema: "migrations/*.up.sql"
    queries: "query/course_members"
    gen:
      go:
        package: "coursemembersdb"
        out: "internal/db/course_members"
        emit_prepared_queries: true
        emit_json_tags: true
        emit_interface: true
        overrides:
          - column: "course_members.members"
            go_type:
              type: "Members"
  - engine: "sqlite"
    schema: "migrations/*.up.sql"
    queries: "query/orders"
    gen:
      go:
        package: "ordersdb"
        out: "internal/db/orders"
        emit_prepared_queries: true
        emit_json_tags: true
        emit_interface: true
