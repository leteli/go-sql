version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations/courses/*.up.sql"
    queries: "query/courses"
    gen:
      go:
        package: "coursesdb"
        out: "internal/db/courses"
        emit_prepared_queries: true
        emit_json_tags: true
        emit_interface: true
  - engine: "sqlite"
    schema: "migrations/users/*.up.sql"
    queries: "query/users"
    gen:
      go:
        package: "usersdb"
        out: "internal/db/users"
        emit_prepared_queries: true
        emit_json_tags: true
        emit_interface: true

